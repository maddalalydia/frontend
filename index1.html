<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Task Manager App</title>
  <link rel="stylesheet" href="style1.css">
</head>

<body>

  <div class="container">

    <h1>Task Manager App</h1>
    <form id="taskForm">

      <input
        type="number"
        id="taskId"
        placeholder="Enter Task ID"
        required
      >

      <input
        type="text"
        id="taskName"
        placeholder="Enter Task Name"
        required
      >

      <input
        type="text"
        id="taskDesc"
        placeholder="Enter Description"
        required
      >

      <button type="submit">
        Add Task
      </button>

    </form>
    <input
      type="text"
      id="filterInput"
      placeholder="Search Task"
    >
    <div id="taskList"></div>

  </div>
  <script src="script1.js"></script>

</body>
</html>
